apiVersion: v1
kind: Pod
metadata:
  name: postgres-demo
  namespace: default
spec:
  containers:
    - name: postgres
      image: postgres:16
      env:
        - name: POSTGRES_HOST_AUTH_METHOD
          value: scram-sha-256
        - name: POSTGRES_INITDB_ARGS
          value: "--auth-host=scram-sha-256"
      envFrom:
        - secretRef:
            name: postgres-credentials
      ports:
        - containerPort: 5432
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: postgres-data
      hostPath:
        path: /tmp/postgres-data
        type: DirectoryOrCreate

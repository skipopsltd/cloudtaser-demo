apiVersion: v1
kind: Pod
metadata:
  name: postgres-demo
  namespace: default
spec:
  containers:
    - name: postgres
      image: postgres:16
      envFrom:
        - secretRef:
            name: postgres-credentials
      ports:
        - containerPort: 5432
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: postgres-data
      hostPath:
        path: /tmp/postgres-data
        type: DirectoryOrCreate

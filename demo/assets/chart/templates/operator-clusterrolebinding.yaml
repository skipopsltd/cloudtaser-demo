apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudcondom-operator
  labels:
    app.kubernetes.io/name: cloudcondom-operator
    {{- include "cloudcondom.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudcondom-operator
subjects:
  - kind: ServiceAccount
    name: cloudcondom-operator
    namespace: {{ include "cloudcondom.namespace" . }}

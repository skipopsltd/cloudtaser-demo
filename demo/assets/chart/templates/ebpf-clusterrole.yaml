{{- if .Values.ebpf.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudtaser-ebpf
  labels:
    app.kubernetes.io/name: cloudtaser-ebpf
    {{- include "cloudtaser.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
{{- end }}

apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: cloudcondom-operator-webhook
  labels:
    app.kubernetes.io/name: cloudcondom-operator
    {{- include "cloudcondom.labels" . | nindent 4 }}
webhooks:
  - name: inject.cloudcondom.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: {{ .Values.operator.webhook.timeoutSeconds }}
    failurePolicy: {{ .Values.operator.webhook.failurePolicy }}
    reinvocationPolicy: IfNeeded
    clientConfig:
      service:
        name: cloudcondom-operator-webhook
        namespace: {{ include "cloudcondom.namespace" . }}
        path: /mutate-v1-pod
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ include "cloudcondom.namespace" . }}
            - kube-system

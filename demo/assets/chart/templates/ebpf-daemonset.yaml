{{- if .Values.ebpf.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudtaser-ebpf
  namespace: {{ include "cloudtaser.namespace" . }}
  labels:
    app.kubernetes.io/name: cloudtaser-ebpf
    {{- include "cloudtaser.labels" . | nindent 4 }}
    app.kubernetes.io/component: enforcement
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudtaser-ebpf
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudtaser-ebpf
        {{- include "cloudtaser.labels" . | nindent 8 }}
        app.kubernetes.io/component: enforcement
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: cloudtaser-ebpf
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: ebpf-agent
          image: {{ include "cloudtaser.ebpf.image" . }}
          imagePullPolicy: {{ .Values.ebpf.image.pullPolicy }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
                - NET_ADMIN
                - SYS_RESOURCE
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: EBPF_OBJECT_PATH
              value: /opt/cloudtaser/secret_monitor.o
            - name: GRPC_LISTEN_ADDR
              value: "0.0.0.0:9443"
            - name: HEALTH_LISTEN_ADDR
              value: "0.0.0.0:9090"
            - name: ENFORCE_MODE
              value: {{ .Values.ebpf.enforceMode | quote }}
            - name: LOG_ALL
              value: {{ .Values.ebpf.logAll | quote }}
            - name: REACTIVE_KILL
              value: {{ .Values.ebpf.reactiveKill | quote }}
          ports:
            - name: grpc
              containerPort: 9443
              hostPort: 9443
              protocol: TCP
            - name: health
              containerPort: 9090
              hostPort: 9090
              protocol: TCP
          resources:
            {{- toYaml .Values.ebpf.resources | nindent 12 }}
          volumeMounts:
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: sys-kernel-btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
            type: DirectoryOrCreate
        - name: sys-kernel-btf
          hostPath:
            path: /sys/kernel/btf
            type: DirectoryOrCreate
        - name: proc
          hostPath:
            path: /proc
            type: Directory
{{- end }}

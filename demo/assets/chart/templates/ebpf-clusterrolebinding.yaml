{{- if .Values.ebpf.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudcondom-ebpf
  labels:
    app.kubernetes.io/name: cloudcondom-ebpf
    {{- include "cloudcondom.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudcondom-ebpf
subjects:
  - kind: ServiceAccount
    name: cloudcondom-ebpf
    namespace: {{ include "cloudcondom.namespace" . }}
{{- end }}

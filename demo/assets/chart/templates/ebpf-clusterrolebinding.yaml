{{- if .Values.ebpf.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudtaser-ebpf
  labels:
    app.kubernetes.io/name: cloudtaser-ebpf
    {{- include "cloudtaser.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudtaser-ebpf
subjects:
  - kind: ServiceAccount
    name: cloudtaser-ebpf
    namespace: {{ include "cloudtaser.namespace" . }}
{{- end }}

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudtaser-operator
  labels:
    app.kubernetes.io/name: cloudtaser-operator
    {{- include "cloudtaser.labels" . | nindent 4 }}
rules:
  - apiGroups: ["api.cloudtaser.io"]
    resources: ["cloudtaserconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["api.cloudtaser.io"]
    resources: ["cloudtaserconfigs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["api.cloudtaser.io"]
    resources: ["cloudtaserconfigs/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]

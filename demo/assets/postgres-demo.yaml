apiVersion: v1
kind: Pod
metadata:
  name: postgres-demo
  namespace: default
  annotations:
    cloudtaser.io/inject: "true"
    cloudtaser.io/ebpf: "true"
    cloudtaser.io/vault-address: "http://vault.cloudtaser-vault.svc:8200"
    cloudtaser.io/vault-auth-method: "token"
    cloudtaser.io/secret-paths: "secret/data/demo/postgres"
    cloudtaser.io/env-map: "password=POSTGRES_PASSWORD,username=POSTGRES_USER"
spec:
  containers:
    - name: postgres
      image: postgres:16
      securityContext:
        readOnlyRootFilesystem: false
      env:
        - name: POSTGRES_HOST_AUTH_METHOD
          value: scram-sha-256
      ports:
        - containerPort: 5432
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
  volumes:
    - name: postgres-data
      hostPath:
        path: /tmp/postgres-data
        type: DirectoryOrCreate
